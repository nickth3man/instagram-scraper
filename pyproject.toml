[project]
name = "instagram-scraper"
version = "0.1.0"
description = "Instagram scraping workflows and data collection"
readme = "README.md"
authors = [
    { name = "Nicolas Alexander", email = "nickth3man@gmail.com" }
]
requires-python = ">=3.13"
dependencies = [
    "diskcache>=5.6.3",
    "httpx>=0.28.1",
    "instaloader>=4.15",
    "pydantic>=2.11.9",
    "requests>=2.32.5",
    "rich>=14.1.0",
    "sqlalchemy>=2.0.43",
    "structlog>=25.4.0",
    "typer>=0.17.4",
]

[project.scripts]
instagram-scraper = "instagram_scraper:main"
instagram-scraper-profile = "instagram_scraper.scrape_instagram_profile:main"
instagram-scraper-browser-dump = "instagram_scraper.scrape_instagram_from_browser_dump:main"
instagram-scraper-download-videos = "instagram_scraper.download_instagram_videos:main"

[build-system]
requires = ["uv_build>=0.9.26,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "aiohttp>=3.11.13",
    "pytest>=9.0.2",
    "pytest-asyncio>=0.25.3",
    "ruff>=0.15.4",
    "scalene>=2.1.4",
    "ty>=0.0.20",
    "vcrpy>=8.1.1",
]

[tool.ruff]
target-version = "py313"

[tool.ruff.lint]
preview = true
select = ["ALL"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = [
    "ANN001",
    "ANN202",
    "ANN204",
    "ARG001",
    "CPY001",
    "D",
    "EM101",
    "FBT002",
    "INP001",
    "PLR2004",
    "PLR6301",
    "PT018",
    "S101",
    "TRY003",
]

[tool.ty.rules]
all = "error"

[tool.ty.src]
exclude = ["tests/"]

[tool.ty.terminal]
error-on-warning = true

[tool.ty.analysis]
respect-type-ignore-comments = false

[tool.pytest.ini_options]
pythonpath = ["src"]
