[project]
name = "instagram-scraper"
version = "0.1.0"
description = "Instagram scraping workflows and data collection"
readme = "README.md"
authors = [
    { name = "Nicolas Alexander", email = "nickth3man@gmail.com" }
]
requires-python = ">=3.13"
dependencies = [
    "diskcache>=5.6.3",
    "freesimplegui>=5.1.0",
    "httpx>=0.28.1",
    "instaloader>=4.15",
    "jinja2>=3.1.6",
    "pandas>=2.2.3",
    "pydantic>=2.11.9",
    "requests>=2.32.5",
    "rich>=14.1.0",
    "sqlalchemy>=2.0.43",
    "structlog>=25.4.0",
    "typer>=0.17.4",
]

[project.scripts]
instagram-scraper = "instagram_scraper:main"
instagram-scraper-profile = "instagram_scraper.workflows.profile:main"
instagram-scraper-browser-dump = "instagram_scraper.workflows.browser_dump:main"
instagram-scraper-download-videos = "instagram_scraper.workflows.video_downloads:main"
instagram-scraper-gui = "instagram_scraper.ui.gui:main"

[build-system]
requires = ["uv_build>=0.9.26,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "aiohttp>=3.11.13",
    "openpyxl>=3.1.5",
    "playwright>=1.50.0",
    "pre-commit>=4.3.0",
    "pyarrow>=18.0.0",
    "pytest>=9.0.2",
    "pytest-asyncio>=0.25.3",
    "pytest-mock>=3.15.1",
    "ruff>=0.15.4",
    "scalene>=2.1.4",
    "ty>=0.0.20",
    "vcrpy>=8.1.1",
]

[tool.ruff]
target-version = "py313"

[tool.ruff.lint]
preview = true
select = ["ALL"]

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = [
    "ANN001",
    "ANN202",
    "ANN204",
    "ARG001",
    "CPY001",
    "D",
    "DOC201",   # Missing Returns in docstring (test fixtures)
    "DOC402",   # Missing Yields in docstring (test fixtures)
    "DTZ001",   # Datetime without timezone (acceptable in tests)
    "EM101",
    "FBT002",
    "INP001",
    "PLR2004",
    "PLR6301",
    "PLR0913",  # Too many arguments in test functions
    "PLR0917",  # Too many positional arguments in test functions
    "PT018",
    "RUF059",   # Unused unpacked variables (often intentional in tests)
    "RUF069",   # Float equality comparisons (acceptable in tests)
    "S101",
    "S108",     # /tmp paths in tests (acceptable in tests)
    "TRY003",
    "PLC0415",  # Imports inside functions (needed for testing)
    "PLC1901",  # Empty string comparisons (explicit is clearer in tests)
    "PLC2701",  # Private name imports (needed for testing)
    "SLF001",   # Private member access (needed for testing)
    "TC003",    # Type checking imports (acceptable in tests)
]

[tool.ty.rules]
all = "error"

[tool.ty.src]
exclude = ["tests/"]

[tool.ty.terminal]
error-on-warning = true

[tool.ty.analysis]
respect-type-ignore-comments = false

[tool.pytest.ini_options]
